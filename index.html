<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外链管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- 顶部导航 -->
  <nav class="bg-white shadow mb-6">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between h-16">
        <div class="flex space-x-8">
          <button id="nav-sites" class="nav-btn active inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium" onclick="switchTab('sites')">
            外链网站
          </button>
          <button id="nav-submissions" class="nav-btn inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium" onclick="switchTab('submissions')">
            发帖记录
          </button>
          <button id="nav-keywords" class="nav-btn inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium" onclick="switchTab('keywords')">
            网站关键词
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="max-w-7xl mx-auto px-4">
    <!-- 外链网站 Tab -->
    <div id="tab-sites" class="tab-content">
      <!-- 工具栏 -->
      <div class="flex justify-between items-center mb-4">
        <div class="flex space-x-2">
          <select id="filter-site-type" class="px-3 py-2 border rounded-lg text-sm" onchange="loadSites()">
            <option value="">全部类型</option>
            <option value="blog">博客</option>
            <option value="forum">论坛</option>
            <option value="directory">目录</option>
            <option value="news">新闻</option>
            <option value="tool">工具</option>
            <option value="social">社交</option>
            <option value="other">其他</option>
          </select>
          <select id="filter-backlink-type" class="px-3 py-2 border rounded-lg text-sm" onchange="loadSites()">
            <option value="">全部外链方式</option>
            <option value="comment">评论</option>
            <option value="site_submission">网站提交</option>
            <option value="profile_post">个人资料</option>
            <option value="forum_thread">论坛主题</option>
            <option value="article_submission">文章提交</option>
            <option value="contact_outreach">联系外展</option>
            <option value="other">其他</option>
          </select>
        </div>
        <button onclick="openSiteModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">
          + 新增网站
        </button>
      </div>

      <!-- 网站列表 -->
      <div class="bg-white shadow rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">网址</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">DR</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">外链方式</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">需登录</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
            </tr>
          </thead>
          <tbody id="sites-tbody" class="bg-white divide-y divide-gray-200">
          </tbody>
        </table>
      </div>
    </div>

    <!-- 发帖记录 Tab -->
    <div id="tab-submissions" class="tab-content hidden">
      <!-- 工具栏 -->
      <div class="flex justify-between items-center mb-4">
        <div class="flex space-x-2">
          <select id="filter-submission-status" class="px-3 py-2 border rounded-lg text-sm" onchange="loadSubmissions()">
            <option value="">全部状态</option>
            <option value="pending">待处理</option>
            <option value="sent">已发送</option>
            <option value="failed">失败</option>
          </select>
          <select id="filter-submission-site" class="px-3 py-2 border rounded-lg text-sm" onchange="loadSubmissions()">
            <option value="">全部网站</option>
          </select>
          <input type="text" id="filter-my-site" placeholder="我的网站" class="px-3 py-2 border rounded-lg text-sm" oninput="debounceLoadSubmissions()">
        </div>
        <button onclick="openSubmissionModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">
          + 新增记录
        </button>
      </div>

      <!-- 记录列表 -->
      <div class="bg-white shadow rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">我的网站</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">目标网站</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">目标地址</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">备注</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
            </tr>
          </thead>
          <tbody id="submissions-tbody" class="bg-white divide-y divide-gray-200">
          </tbody>
        </table>
      </div>
    </div>

    <!-- 网站关键词 Tab -->
    <div id="tab-keywords" class="tab-content hidden">
      <div class="flex justify-between items-center mb-4">
        <div class="flex space-x-2">
          <input
            type="text"
            id="filter-keyword-domain"
            placeholder="筛选域名，例如 belindoc.com"
            class="px-3 py-2 border rounded-lg text-sm"
            oninput="debounceLoadKeywordData()"
          >
          <input
            type="text"
            id="filter-keyword-record"
            placeholder="筛选关键词或页面 URL"
            class="px-3 py-2 border rounded-lg text-sm"
            oninput="renderKeywordRecords()"
          >
        </div>
        <button onclick="loadKeywordData()" class="px-4 py-2 border rounded-lg hover:bg-gray-50 text-sm">
          刷新
        </button>
      </div>

      <div class="bg-white shadow rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">网站</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">关键词</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                <button type="button" class="flex items-center gap-1 hover:text-gray-700" onclick="toggleKeywordSort('rank_position')">
                  排名
                  <span id="sort-rank_position-indicator" class="text-[10px] text-gray-400">-</span>
                </button>
              </th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                <button type="button" class="flex items-center gap-1 hover:text-gray-700" onclick="toggleKeywordSort('clicks')">
                  点击
                  <span id="sort-clicks-indicator" class="text-[10px] text-gray-400">-</span>
                </button>
              </th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                <button type="button" class="flex items-center gap-1 hover:text-gray-700" onclick="toggleKeywordSort('kw_volume')">
                  搜索量
                  <span id="sort-kw_volume-indicator" class="text-[10px] text-gray-400">-</span>
                </button>
              </th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">意图</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Top URL</th>
            </tr>
          </thead>
          <tbody id="keyword-records-tbody" class="bg-white divide-y divide-gray-200">
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- 网站模态框 -->
  <div id="site-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md mx-4">
      <h3 id="site-modal-title" class="text-lg font-medium mb-4">新增网站</h3>
      <form id="site-form" onsubmit="saveSite(event)">
        <input type="hidden" id="site-id">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">网址</label>
            <input type="url" id="site-url" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">网站类型</label>
            <select id="site-type" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="blog">博客</option>
              <option value="forum">论坛</option>
              <option value="directory">目录</option>
              <option value="news">新闻</option>
              <option value="tool">工具</option>
              <option value="social">社交</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">DR (0-100)</label>
            <input type="number" id="site-dr" min="0" max="100" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">外链方式</label>
            <select id="site-backlink-type" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="comment">评论</option>
              <option value="site_submission">网站提交</option>
              <option value="profile_post">个人资料</option>
              <option value="forum_thread">论坛主题</option>
              <option value="article_submission">文章提交</option>
              <option value="contact_outreach">联系外展</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div>
            <label class="flex items-center">
              <input type="checkbox" id="site-requires-login" class="mr-2">
              <span class="text-sm font-medium text-gray-700">需要登录</span>
            </label>
          </div>
        </div>
        <div class="flex justify-end space-x-3 mt-6">
          <button type="button" onclick="closeSiteModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
          <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 记录模态框 -->
  <div id="submission-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md mx-4">
      <h3 id="submission-modal-title" class="text-lg font-medium mb-4">新增记录</h3>
      <form id="submission-form" onsubmit="saveSubmission(event)">
        <input type="hidden" id="submission-id">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">我的网站</label>
            <input type="url" id="submission-my-site-url" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">目标网站</label>
            <select id="submission-site-id" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
            <select id="submission-status" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="pending">待处理</option>
              <option value="sent">已发送</option>
              <option value="failed">失败</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">目标地址</label>
            <input type="url" id="submission-target-url" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
            <textarea id="submission-note" rows="2" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
        </div>
        <div class="flex justify-end space-x-3 mt-6">
          <button type="button" onclick="closeSubmissionModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
          <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-lg hidden">
    <span id="toast-message"></span>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
